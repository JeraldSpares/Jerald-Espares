<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="100%" height="40" preserveAspectRatio="none">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#0EA5E9" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#0EA5E9" stop-opacity="0.9"/>
      <stop offset="80%"  stop-color="#0EA5E9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dotGlow">
      <stop offset="0%"   stop-color="#0EA5E9" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#7DD3FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Pulsing center line -->
  <rect x="0" y="19" width="1200" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.55;0.95;0.55" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Traveling dot 1 -->
  <circle cy="20" r="10" fill="url(#dotGlow)">
    <animate attributeName="cx" values="-20;1220" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Traveling dot 2 (offset in time, opposite direction) -->
  <circle cy="20" r="7" fill="url(#dotGlow)">
    <animate attributeName="cx" values="1220;-20" dur="7.5s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Traveling dot 3 -->
  <circle cy="20" r="5" fill="url(#dotGlow)">
    <animate attributeName="cx" values="-20;1220" dur="9s" begin="4s" repeatCount="indefinite"/>
  </circle>
</svg>
